version: "3.9"

services:
  manimations-studio:

    image: manimations-studio:latest

    container_name: manimations-studio

    restart: unless-stopped

    ports:
      - "8088:80"

    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      MANIMATIONS_DATA_DIR: /projects

    volumes:
      - ./projects:/projects
      - ./media:/app/media
